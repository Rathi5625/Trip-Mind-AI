services:
  postgres:
    image: postgres:17-alpine
    container_name: tripmind-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tripmind_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tripmind_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
