server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: tripmind-api
  datasource:
    url: jdbc:postgresql://${SPRING_DATASOURCE_HOST:localhost}:${SPRING_DATASOURCE_PORT:5432}/${SPRING_DATASOURCE_DB:tripmind_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# Custom security configuration properties
app:
  jwt:
    secret: 9a4f2c5d8e7b1a6c3f5e8d9a0b2c4d6e7f9a1b3c5d7e8f0a2b4c6d8e0f1a3b5c7d9
    accessTokenExpirationMs: 3600000 # 1 hour
    refreshTokenExpirationMs: 604800000 # 7 days
  gemini:
    api-key: ${GEMINI_API_KEY:}
  weather:
    api-key: ${WEATHER_API_KEY:}
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always

